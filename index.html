<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日までのタスク</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div id="app">
    <header>
      <h1>今日までのタスク</h1>
      <p id="date-display"></p>
    </header>

    <div id="auth-section" style="display:none;">
      <p>GitHub PAT を入力（classic, repo + project スコープ）</p>
      <input type="password" id="pat-input" placeholder="ghp_...">
      <button id="pat-submit">取得</button>
    </div>

    <div id="loading" style="display:none;">
      <p>読み込み中...</p>
    </div>

    <div id="error" style="display:none;">
      <p id="error-message"></p>
      <button id="retry-btn">再試行</button>
      <button id="reset-token-btn">トークンを再入力</button>
    </div>

    <div id="issue-list"></div>

    <footer>
      <button id="refresh-btn" style="display:none;">更新</button>
      <button id="logout-btn" style="display:none;">トークン削除</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
